<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Minecrawl</title>
  <script>
  (function(){
    var c=document.createElement('canvas'),x=c.getContext('2d');
    c.width=c.height=32;
    x.fillStyle='#0d1117';x.fillRect(0,0,32,32);
    x.fillStyle='#00ff8830';x.beginPath();x.arc(16,16,14,0,Math.PI*2);x.fill();
    x.fillStyle='#00ff88';x.beginPath();x.arc(16,16,9,0,Math.PI*2);x.fill();
    x.fillStyle='#00cc66';x.beginPath();x.arc(16,16,5,0,Math.PI*2);x.fill();
    x.fillStyle='#00dd6a';x.beginPath();
    x.moveTo(29,16);x.lineTo(20,11);x.lineTo(20,21);x.closePath();x.fill();
    var l=document.createElement('link');l.rel='icon';l.href=c.toDataURL();
    document.head.appendChild(l);
  })();
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    canvas {
      display: block;
      image-rendering: crisp-edges;
      border-radius: 6px;
      box-shadow: 0 0 60px rgba(0, 255, 136, 0.08);
      touch-action: none;
    }
    #overlay {
      position: fixed; inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
      background: #00000088;
      image-rendering: pixelated;
    }
    #overlay.show { display: flex; }
    .ob {
      background: #0a0a14;
      border: 3px solid #ffd700;
      box-shadow: 0 0 0 3px #0a0a14, 0 0 30px #ffd70030, inset 0 0 30px #ffd70008;
      padding: 28px 36px;
      text-align: center;
      color: #c9d1d9;
      min-width: 340px;
      max-width: 420px;
    }
    .ob h1 {
      color: #ffd700; font: bold 24px 'Courier New', monospace;
      margin: 0 0 2px; letter-spacing: 3px; text-transform: uppercase;
      text-shadow: 0 0 10px #ffd70060, 2px 2px 0 #aa8800;
    }
    .ob .sub {
      color: #00ff88; font: bold 11px 'Courier New', monospace;
      margin: 0 0 18px; letter-spacing: 2px; text-transform: uppercase;
      text-shadow: 0 0 8px #00ff8840;
    }
    .ob .time-line {
      color: #4a9eff; font: bold 14px 'Courier New', monospace;
      margin: 0 0 20px; letter-spacing: 1px;
      text-shadow: 0 0 6px #4a9eff40;
    }
    .ob .sep {
      border: none; border-top: 2px dashed #30363d; margin: 0 0 16px;
    }
    .ob .input-row { display: flex; gap: 8px; margin-bottom: 18px; }
    .ob input {
      flex: 1; padding: 8px 10px;
      background: #000; border: 2px solid #30363d;
      color: #00ff88; font: bold 14px 'Courier New', monospace;
      outline: none; text-transform: uppercase; letter-spacing: 1px;
    }
    .ob input::placeholder { color: #30363d; text-transform: uppercase; }
    .ob input:focus { border-color: #00ff88; box-shadow: 0 0 8px #00ff8830; }
    .ob button {
      padding: 8px 14px;
      background: #ffd700; border: 2px solid #ffaa00;
      color: #0a0a14; font: bold 13px 'Courier New', monospace; cursor: pointer;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .ob button:hover { background: #ffee55; box-shadow: 0 0 10px #ffd70050; }
    .ob button:disabled { background: #222; border-color: #333; color: #555; cursor: default; box-shadow: none; }
    .ob .lb { margin-top: 14px; text-align: left; }
    .ob .lb-title {
      color: #ffd700; font: bold 10px 'Courier New', monospace;
      margin-bottom: 8px; text-transform: uppercase;
      letter-spacing: 3px; text-align: center;
      text-shadow: 0 0 6px #ffd70040;
    }
    .ob .lb-row {
      display: flex; justify-content: space-between; padding: 3px 0;
      font: bold 12px 'Courier New', monospace; color: #586069;
      border-bottom: 1px solid #1a1a2a;
    }
    .ob .lb-row:nth-child(2) { color: #ffd700; }
    .ob .lb-row:nth-child(3) { color: #c0c0c0; }
    .ob .lb-row:nth-child(4) { color: #cd7f32; }
    .ob .lb-row .rank { width: 28px; }
    .ob .lb-row .name { flex: 1; text-transform: uppercase; }
    .ob .lb-row .val { width: 60px; text-align: right; }
    .ob .hint {
      color: #30363d; font: bold 11px 'Courier New', monospace;
      margin-top: 16px; letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="overlay">
    <div class="ob">
      <h1>BOARD CLEARED</h1>
      <p class="sub">- you survived the mines -</p>
      <p class="time-line" id="ov-time"></p>
      <hr class="sep">
      <div class="input-row">
        <input type="text" id="nameInput" placeholder="ENTER NAME" maxlength="16" autocomplete="off" spellcheck="false">
        <button id="submitBtn">OK</button>
      </div>
      <div id="ov-lb"></div>
      <p class="hint">[R] PLAY AGAIN</p>
    </div>
  </div>
  <script>
(() => {
'use strict';

const COLS = 20, ROWS = 20, TILE = 32;
const HUD_H = 52;
const W = COLS * TILE, H = ROWS * TILE + HUD_H;
const MINE_RATE = 0.15;
const CLEAR_R = 2;
const MOVE_CD = 125;
const ENEMY_SPEED = 900;
const HATCH_TIME = 5000;
const BULLET_SPEED = 18;
const LOOT_BULLET = 0.20;
const LOOT_EGG = 0.08;
const EXPLODE_EGG = 0.04;
const NUM_CLR = ['','#4a9eff','#4aff7a','#ff4a6a','#9a4aff','#ff8a4a','#4affff','#ff4aff','#c0c0c0'];

// ---- AIRTABLE CONFIG ----
const AT_BASE  = 'appsvu3ApgrBKyAx6';
const AT_TABLE = 'tblHbGi1TVIEnOS2V';
const AT_TOKEN = 'patxeMh9t8lsRlU9l.973e131b2895f6b1e921cb91959264ec16e1a9c5e1d481e7ae18bd2c2e73881b';
const AT_URL   = `https://api.airtable.com/v0/${AT_BASE}/${encodeURIComponent(AT_TABLE)}`;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

function fitCanvas() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H) * 0.95;
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

let grid, player, enemies, eggs, projectiles, particles;
let tilesLeft, totalSafe, gameState, lastMove, shake, lastTime = 0;
let advancedMode = false;
const MEGA_RATE = 0.10;
const FAST_ENEMY_RATE = 0.25;
let enemyBullets = [];
const ENEMY_COLORS = {
  normal: { body: '#ff2d55', glow: '#ff2d5518', eye: '#1a0008', d1: '#ff2d55', d2: '#ff8888' },
  fast:   { body: '#22dd55', glow: '#22dd5518', eye: '#001a08', d1: '#22dd55', d2: '#88ffaa' },
  shooter:{ body: '#66aaff', glow: '#66aaff18', eye: '#001030', d1: '#66aaff', d2: '#aaddff' },
  charger:{ body: '#aa44ff', glow: '#aa44ff18', eye: '#0a0020', d1: '#aa44ff', d2: '#dd88ff' },
};
let gameStartTime = 0, gameTime = 0, finalTime = 0;
let playerIP = '';
let leaderboard = [];
const keys = new Set();
const overlay = document.getElementById('overlay');
const nameInput = document.getElementById('nameInput');
const submitBtn = document.getElementById('submitBtn');

function fmtTime(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function fetchIP() {
  fetch('https://api.ipify.org?format=json')
    .then(r => r.json()).then(d => { playerIP = d.ip; }).catch(() => {});
}

function atHeaders() {
  return { 'Authorization': 'Bearer ' + AT_TOKEN, 'Content-Type': 'application/json' };
}

function fetchLeaderboard() {
  return fetch(AT_URL + '?filterByFormula=' + encodeURIComponent('{Win}=TRUE()') + '&sort%5B0%5D%5Bfield%5D=Time&sort%5B0%5D%5Bdirection%5D=asc&maxRecords=10', {
    headers: atHeaders()
  }).then(r => r.json()).then(d => {
    leaderboard = (d.records || []).map(r => r.fields);
  }).catch(() => {});
}

function submitScore(name, win) {
  const fields = {
    Name: name,
    Time: fmtTime(finalTime),
    TilesCleared: win ? totalSafe : totalSafe - tilesLeft,
    Date: new Date().toISOString().slice(0, 10),
    Win: !!win,
  };
  if (playerIP) fields.IP = playerIP;
  return fetch(AT_URL, {
    method: 'POST', headers: atHeaders(),
    body: JSON.stringify({ fields })
  }).then(r => r.json()).then(d => {
    if (d.error) { console.error('Airtable:', d.error); throw d.error; }
    if (win) return fetchLeaderboard();
  });
}

function showOverlay() {
  document.getElementById('ov-time').textContent =
    'TIME  ' + fmtTime(finalTime) + '  //  ' + totalSafe + ' TILES';
  document.getElementById('ov-lb').innerHTML = '';
  overlay.classList.add('show');
  submitBtn.disabled = false;
  submitBtn.textContent = 'OK';
  nameInput.disabled = false;
  nameInput.value = '';
  nameInput.focus();
}

function hideOverlay() { overlay.classList.remove('show'); }

function renderLeaderboardHTML(target, submittedName) {
  if (!leaderboard.length) return;
  let matched = false;
  let html = '<div class="lb"><div class="lb-title">HIGH SCORES</div>';
  leaderboard.forEach((r, i) => {
    const name = (r.Name || '???').toUpperCase().padEnd(12).slice(0, 12);
    const isNew = !matched && submittedName &&
      (r.Name || '').toUpperCase() === submittedName.toUpperCase() &&
      r.Time === fmtTime(finalTime);
    if (isNew) matched = true;
    const tag = isNew ? ' <span style="color:#00ff88;font-size:10px">NEW</span>' : '';
    html += `<div class="lb-row"><span class="rank">${i+1}.</span>` +
      `<span class="name">${esc(name)}${tag}</span>` +
      `<span class="val">${r.Time || '?:??'}</span></div>`;
  });
  html += '</div>';
  target.innerHTML = html;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

submitBtn.addEventListener('click', () => {
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); return; }
  submitBtn.disabled = true;
  nameInput.disabled = true;
  submitBtn.textContent = '...';
  submitScore(name, true).then(() => {
    submitBtn.textContent = 'OK!';
    renderLeaderboardHTML(document.getElementById('ov-lb'), name);
  }).catch(() => { submitBtn.textContent = 'ERR'; });
});
nameInput.addEventListener('keydown', (e) => {
  e.stopPropagation();
  if (e.key === 'Enter') submitBtn.click();
});

function init() {
  gameState = 'title';
  fetchIP();
  fetchLeaderboard();
}

function startGame() {
  grid = []; enemies = []; eggs = []; projectiles = []; particles = []; explosionQueue = []; enemyBullets = [];
  shake = { x: 0, y: 0, i: 0 };
  lastMove = 0;
  const cx = COLS >> 1, cy = ROWS >> 1;
  player = { x: cx, y: cy, fx: cx, fy: cy, dir: { x: 1, y: 0 }, bullets: 3, alive: true };
  gameTime = 0; finalTime = 0; gameStartTime = performance.now();
  hideOverlay();
  genBoard(cx, cy);
  gameState = 'playing';
}

function genBoard(cx, cy) {
  for (let y = 0; y < ROWS; y++) {
    grid[y] = [];
    for (let x = 0; x < COLS; x++)
      grid[y][x] = { mine: false, mega: false, rev: false, crater: false, num: 0, nearMega: false, loot: null, rt: 0 };
  }
  for (let y = 0; y < ROWS; y++)
    for (let x = 0; x < COLS; x++) {
      if (Math.abs(x - cx) <= CLEAR_R && Math.abs(y - cy) <= CLEAR_R) continue;
      if (Math.random() < MINE_RATE) {
        grid[y][x].mine = true;
        if (advancedMode && Math.random() < MEGA_RATE) grid[y][x].mega = true;
      }
    }
  if (advancedMode)
    for (let y = 0; y < ROWS; y++)
      for (let x = 0; x < COLS; x++) {
        if (grid[y][x].mine) continue;
        for (let dy = -1; dy <= 1; dy++)
          for (let dx = -1; dx <= 1; dx++) {
            if (!dx && !dy) continue;
            const nx = x + dx, ny = y + dy;
            if (ib(nx, ny) && grid[ny][nx].mega) { grid[y][x].nearMega = true; }
          }
      }
  for (let y = 0; y < ROWS; y++)
    for (let x = 0; x < COLS; x++) {
      if (grid[y][x].mine) continue;
      let n = 0;
      for (let dy = -1; dy <= 1; dy++)
        for (let dx = -1; dx <= 1; dx++) {
          if (!dx && !dy) continue;
          const nx = x + dx, ny = y + dy;
          if (ib(nx, ny) && grid[ny][nx].mine) n++;
        }
      grid[y][x].num = n;
    }
  for (let y = 0; y < ROWS; y++)
    for (let x = 0; x < COLS; x++) {
      const t = grid[y][x];
      if (t.mine || t.num === 0) continue;
      const r = Math.random();
      if (r < LOOT_BULLET) t.loot = 'bullet';
      else if (r < LOOT_BULLET + LOOT_EGG) t.loot = 'egg';
    }
  totalSafe = 0;
  for (let y = 0; y < ROWS; y++)
    for (let x = 0; x < COLS; x++)
      if (!grid[y][x].mine) totalSafe++;
  tilesLeft = totalSafe;
  reveal(cx, cy);
  for (let y = 0; y < ROWS; y++)
    for (let x = 0; x < COLS; x++)
      if (grid[y][x].rev) grid[y][x].loot = null;
}

function ib(x, y) { return x >= 0 && x < COLS && y >= 0 && y < ROWS; }

function reveal(x, y) {
  if (!ib(x, y)) return;
  const t = grid[y][x];
  if (t.rev || t.crater) return;
  if (t.mine) { explode(x, y); return; }
  t.rev = true; t.rt = performance.now(); tilesLeft--;
  if (t.loot === 'egg') { spawnEgg(x, y); t.loot = null; }
  if (t.num === 0)
    for (let dy = -1; dy <= 1; dy++)
      for (let dx = -1; dx <= 1; dx++)
        if (dx || dy) reveal(x + dx, y + dy);
  if (tilesLeft <= 0 && gameState === 'playing') winGame();
}

let explosionQueue = [];
const CHAIN_DELAY = 150;

function explode(sx, sy) { doExplosion(sx, sy); }

function doExplosion(mx, my) {
  const mt = grid[my][mx];
  if (!mt.mine) return;
  const isMega = mt.mega;
  const rad = isMega ? 2 : 1;
  mt.crater = true; mt.rev = true; mt.mine = false; mt.mega = false; mt.loot = null;

  for (let dy = -rad; dy <= rad; dy++)
    for (let dx = -rad; dx <= rad; dx++) {
      const nx = mx + dx, ny = my + dy;
      if (!ib(nx, ny)) continue;
      if (player.x === nx && player.y === ny && gameState === 'playing') loseGame();
      enemies.forEach(e => {
        if (e.x === nx && e.y === ny) emitEnemyDeath(e.fx, e.fy, e.type || 'normal');
      });
      enemies = enemies.filter(e => e.x !== nx || e.y !== ny);
      eggs.forEach(e => {
        if (e.x === nx && e.y === ny) emitEggDeath(e.x, e.y);
      });
      eggs = eggs.filter(e => e.x !== nx || e.y !== ny);
      const nt = grid[ny][nx];
      if (nt.mine && !nt.crater) {
        explosionQueue.push({ x: nx, y: ny, time: performance.now() + CHAIN_DELAY });
      } else if (!nt.rev && !nt.crater) {
        nt.rev = true; nt.rt = performance.now(); nt.loot = null; tilesLeft--;
        if (Math.random() < EXPLODE_EGG) spawnEgg(nx, ny);
      }
    }

  emitExplosion(mx, my, isMega);
  shake.i = Math.max(shake.i, isMega ? 20 : 12);

  if (explosionQueue.length === 0 && tilesLeft <= 0 && gameState === 'playing') winGame();
}

function spawnEgg(x, y) { eggs.push({ x, y, t: performance.now() }); }

function emitExplosion(gx, gy, mega) {
  const cx = gx * TILE + TILE / 2, cy = gy * TILE + TILE / 2 + HUD_H;
  const count = mega ? 28 : 14;
  const spMul = mega ? 1.8 : 1;
  const lifeMul = mega ? 1.6 : 1;
  const szMul = mega ? 1.5 : 1;
  for (let i = 0; i < count; i++) {
    const a = (Math.PI * 2 / count) * i + Math.random() * 0.4;
    const sp = (70 + Math.random() * 120) * spMul;
    particles.push({ x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: (0.3 + Math.random() * 0.4) * lifeMul, ml: (0.3 + Math.random() * 0.4) * lifeMul,
      clr: mega ? (Math.random() > 0.4 ? '#ffd700' : '#ff4400') : (Math.random() > 0.3 ? '#ff6b00' : '#ffcc00'),
      sz: (2 + Math.random() * 3) * szMul });
  }
  particles.push({ x: cx, y: cy, vx: 0, vy: 0,
    life: mega ? 0.25 : 0.12, ml: mega ? 0.25 : 0.12,
    clr: mega ? '#ffd700' : '#ffffff', sz: TILE * (mega ? 3.5 : 1.6), flash: true });
}

function emitEnemyDeath(fx, fy, etype) {
  const cx = fx * TILE + TILE / 2, cy = fy * TILE + TILE / 2 + HUD_H;
  const ec = ENEMY_COLORS[etype] || ENEMY_COLORS.normal;
  const clr1 = ec.d1, clr2 = ec.d2;
  for (let i = 0; i < 16; i++) {
    const a = (Math.PI * 2 / 16) * i + Math.random() * 0.3;
    const sp = 50 + Math.random() * 100;
    particles.push({ x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 0.4 + Math.random() * 0.4, ml: 0.4 + Math.random() * 0.4,
      clr: Math.random() > 0.4 ? clr1 : clr2, sz: 2 + Math.random() * 3 });
  }
  particles.push({ x: cx, y: cy, vx: 0, vy: 0, life: 0.15, ml: 0.15,
    clr: clr1, sz: TILE * 1.2, flash: true });
}

function emitEggDeath(ex, ey) {
  const cx = ex * TILE + TILE / 2, cy = ey * TILE + TILE / 2 + HUD_H;
  for (let i = 0; i < 8; i++) {
    const a = (Math.PI * 2 / 8) * i + Math.random() * 0.4;
    const sp = 30 + Math.random() * 60;
    particles.push({ x: cx, y: cy, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 0.3 + Math.random() * 0.3, ml: 0.3 + Math.random() * 0.3,
      clr: Math.random() > 0.5 ? '#ff6b35' : '#ffaa55', sz: 1.5 + Math.random() * 2 });
  }
}

function movePlayer(dx, dy) {
  player.dir = { x: dx, y: dy };
  const nx = player.x + dx, ny = player.y + dy;
  if (!ib(nx, ny) || !grid[ny][nx].rev) return;
  player.x = nx; player.y = ny;
  if (grid[ny][nx].loot === 'bullet') {
    player.bullets++;
    grid[ny][nx].loot = null;
    const px = (nx + 0.5) * TILE, py = (ny + 0.5) * TILE + HUD_H;
    for (let i = 0; i < 8; i++) {
      const a = (Math.PI * 2 / 8) * i;
      particles.push({ x: px, y: py, vx: Math.cos(a) * 50, vy: Math.sin(a) * 50,
        life: 0.35, ml: 0.35, clr: '#ffd700', sz: 2 });
    }
  }
  for (const e of enemies)
    if (e.x === nx && e.y === ny) { loseGame(); return; }
}

function poll() {
  if (gameState !== 'playing') return;
  const tx = player.x + player.dir.x, ty = player.y + player.dir.y;
  if (!ib(tx, ty)) return;
  const t = grid[ty][tx];
  if (t.rev || t.crater) return;
  reveal(tx, ty);
}

function shoot() {
  if (gameState !== 'playing' || player.bullets <= 0) return;
  player.bullets--;
  projectiles.push({ x: player.x + 0.5, y: player.y + 0.5,
    dx: player.dir.x, dy: player.dir.y, active: true });
}

function loseGame() {
  if (gameState !== 'playing') return;
  gameState = 'lost'; player.alive = false;
  finalTime = (performance.now() - gameStartTime) / 1000;
  submitScore('', false).catch(() => {});
  const px = (player.x + 0.5) * TILE, py = (player.y + 0.5) * TILE + HUD_H;
  for (let i = 0; i < 24; i++) {
    const a = Math.random() * Math.PI * 2, sp = 40 + Math.random() * 90;
    particles.push({ x: px, y: py, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 0.5 + Math.random() * 0.6, ml: 0.5 + Math.random() * 0.6,
      clr: Math.random() > 0.4 ? '#00ff88' : '#ff2d55', sz: 2 + Math.random() * 4 });
  }
  shake.i = 18;
}

function winGame() {
  if (gameState !== 'playing') return;
  gameState = 'won';
  finalTime = (performance.now() - gameStartTime) / 1000;
  showOverlay();
  const px = (player.x + 0.5) * TILE, py = (player.y + 0.5) * TILE + HUD_H;
  for (let i = 0; i < 30; i++) {
    const a = Math.random() * Math.PI * 2, sp = 60 + Math.random() * 100;
    particles.push({ x: px, y: py, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      life: 0.8 + Math.random() * 0.8, ml: 0.8 + Math.random() * 0.8,
      clr: ['#ffd700','#00ff88','#4a9eff','#ff6b00'][i % 4], sz: 2 + Math.random() * 3 });
  }
}

function bfs(sx, sy, tx, ty) {
  if (sx === tx && sy === ty) return [];
  const queue = [{ x: sx, y: sy, path: [] }];
  const vis = new Set([sx + ',' + sy]);
  while (queue.length) {
    const { x, y, path } = queue.shift();
    for (const [dx, dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
      const nx = x + dx, ny = y + dy, k = nx + ',' + ny;
      if (!ib(nx, ny) || vis.has(k) || !grid[ny][nx].rev) continue;
      vis.add(k);
      const np = [...path, { x: nx, y: ny }];
      if (nx === tx && ny === ty) return np;
      queue.push({ x: nx, y: ny, path: np });
    }
  }
  return null;
}

// ---- INPUT ----
document.addEventListener('keydown', (e) => {
  if (document.activeElement === nameInput) return;
  const k = e.key.toLowerCase();
  if (['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright',' ','e'].includes(k))
    e.preventDefault();
  if (e.repeat) return;
  if (gameState === 'title') { startGame(); return; }
  if (gameState !== 'playing') { if (k === 'r') { hideOverlay(); startGame(); } return; }
  keys.add(k);
  if (k === ' ') poll();
  else if (k === 'e') shoot();
});
document.addEventListener('keyup', (e) => keys.delete(e.key.toLowerCase()));
document.addEventListener('blur', () => keys.clear());
canvas.addEventListener('click', (e) => {
  if (gameState !== 'title') return;
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left) / rect.width * W;
  const sy = (e.clientY - rect.top) / rect.height * H;
  const lx = W * 0.15;
  const cbY = H * 0.18 + 230;
  if (sx >= lx - 4 && sx <= lx + 200 && sy >= cbY - 12 && sy <= cbY + 12) {
    advancedMode = !advancedMode;
    e.stopPropagation();
  }
});

// ---- UPDATE ----
function update(dt, now) {
  if (gameState === 'playing') {
    gameTime = (now - gameStartTime) / 1000;
    for (let i = explosionQueue.length - 1; i >= 0; i--) {
      if (now >= explosionQueue[i].time) {
        const eq = explosionQueue.splice(i, 1)[0];
        if (grid[eq.y][eq.x].mine) doExplosion(eq.x, eq.y);
      }
    }
    if (explosionQueue.length === 0 && tilesLeft <= 0 && gameState === 'playing') winGame();
    if (now - lastMove >= MOVE_CD) {
      if (keys.has('w') || keys.has('arrowup')) { movePlayer(0, -1); lastMove = now; }
      else if (keys.has('s') || keys.has('arrowdown')) { movePlayer(0, 1); lastMove = now; }
      else if (keys.has('a') || keys.has('arrowleft')) { movePlayer(-1, 0); lastMove = now; }
      else if (keys.has('d') || keys.has('arrowright')) { movePlayer(1, 0); lastMove = now; }
    }
    if (gameState === 'playing') {
      projectiles.forEach(p => {
        if (!p.active) return;
        p.x += p.dx * BULLET_SPEED * dt;
        p.y += p.dy * BULLET_SPEED * dt;
        const gx = Math.floor(p.x), gy = Math.floor(p.y);
        if (!ib(gx, gy)) { p.active = false; return; }
        if (!grid[gy][gx].rev && !grid[gy][gx].crater) {
          reveal(gx, gy); p.active = false;
          for (let i = 0; i < 5; i++)
            particles.push({ x: p.x * TILE, y: p.y * TILE + HUD_H,
              vx: (Math.random() - 0.5) * 80, vy: (Math.random() - 0.5) * 80,
              life: 0.25, ml: 0.25, clr: '#ffd700', sz: 2 });
        }
      });
      projectiles = projectiles.filter(p => p.active);
    }
    if (gameState === 'playing') {
      eggs = eggs.filter(egg => {
        if (now - egg.t >= HATCH_TIME) {
          let etype = 'normal';
          if (advancedMode) {
            const r = Math.random();
            if (r < 0.25) etype = 'fast';
            else if (r < 0.42) etype = 'shooter';
            else if (r < 0.55) etype = 'charger';
          }
          const espeed = etype === 'fast' ? ENEMY_SPEED / 2 : ENEMY_SPEED;
          const ec = ENEMY_COLORS[etype] || ENEMY_COLORS.normal;
          enemies.push({ x: egg.x, y: egg.y, fx: egg.x, fy: egg.y,
            lm: now, cd: espeed + (Math.random() - 0.5) * 200,
            type: etype, fast: etype === 'fast',
            lastShot: now, shootState: null, shootDir: null, shootStart: 0,
            chargeState: null, chargeDir: null, chargeStart: 0, lastChargeTick: 0 });
          const px = (egg.x + 0.5) * TILE, py = (egg.y + 0.5) * TILE + HUD_H;
          for (let i = 0; i < 8; i++) {
            const a = (Math.PI * 2 / 8) * i;
            particles.push({ x: px, y: py, vx: Math.cos(a) * 40, vy: Math.sin(a) * 40,
              life: 0.3, ml: 0.3, clr: ec.body, sz: 2 });
          }
          return false;
        }
        return true;
      });

      // Charger charge updates (fast tick, separate from normal movement)
      enemies.forEach(en => {
        if (en.type !== 'charger' || !en.chargeState) return;
        if (en.chargeState === 'winding') {
          const aligned = en.chargeDir && (
            (en.chargeDir.x !== 0 && en.y === player.y) ||
            (en.chargeDir.y !== 0 && en.x === player.x));
          if (!aligned) { en.chargeState = null; return; }
          if (now - en.chargeStart > 600) {
            en.chargeState = 'charging'; en.lastChargeTick = now;
          }
        } else if (en.chargeState === 'charging') {
          if (now - en.lastChargeTick < 55) return;
          en.lastChargeTick = now;
          const nx = en.x + en.chargeDir.x, ny = en.y + en.chargeDir.y;
          if (!ib(nx, ny)) { en.chargeState = null; return; }
          en.x = nx; en.y = ny;
          const cpx = (nx + 0.5) * TILE, cpy = (ny + 0.5) * TILE + HUD_H;
          particles.push({ x: cpx, y: cpy, vx: -en.chargeDir.x * 30, vy: -en.chargeDir.y * 30,
            life: 0.2, ml: 0.2, clr: '#aa44ff60', sz: 8, flash: true });
          if (en.x === player.x && en.y === player.y) { loseGame(); return; }
          const t = grid[ny][nx];
          if (!t.rev && !t.crater) {
            if (t.mine) {
              emitEnemyDeath(en.fx, en.fy, 'charger');
              en.dead = true;
              reveal(nx, ny);
              return;
            }
            reveal(nx, ny);
          }
        }
      });
      enemies = enemies.filter(e => !e.dead);

      // Shooter fire check
      enemies.forEach(en => {
        if (en.type !== 'shooter') return;
        if (en.shootState === 'charging') {
          if (now - en.shootStart > 500) {
            en.shootState = null; en.lastShot = now;
            const dir = en.shootDir;
            enemyBullets.push({ x: en.x + 0.5, y: en.y + 0.5, dx: dir.x, dy: dir.y, active: true });
            const spx = (en.x + 0.5) * TILE, spy = (en.y + 0.5) * TILE + HUD_H;
            particles.push({ x: spx, y: spy, vx: 0, vy: 0,
              life: 0.12, ml: 0.12, clr: '#66aaff', sz: TILE * 0.9, flash: true });
          }
          return;
        }
        if (now - en.lastShot < 2500) return;
        const dx = player.x - en.x, dy = player.y - en.y;
        if (dx !== 0 && dy !== 0) return;
        if (dx === 0 && dy === 0) return;
        en.shootState = 'charging';
        en.shootStart = now;
        en.shootDir = { x: Math.sign(dx), y: Math.sign(dy) };
      });

      // Enemy bullet movement
      enemyBullets.forEach(b => {
        if (!b.active) return;
        b.x += b.dx * 12 * dt;
        b.y += b.dy * 12 * dt;
        const gx = Math.floor(b.x), gy = Math.floor(b.y);
        if (!ib(gx, gy)) { b.active = false; return; }
        if (gx === player.x && gy === player.y) { loseGame(); b.active = false; return; }
        if (!grid[gy][gx].rev && !grid[gy][gx].crater) {
          reveal(gx, gy); b.active = false;
          for (let i = 0; i < 4; i++)
            particles.push({ x: b.x * TILE, y: b.y * TILE + HUD_H,
              vx: (Math.random() - 0.5) * 60, vy: (Math.random() - 0.5) * 60,
              life: 0.2, ml: 0.2, clr: '#66aaff', sz: 2 });
        }
      });
      enemyBullets = enemyBullets.filter(b => b.active);

      // Normal movement for all enemy types (chargers in charge state skip)
      const occupied = new Set(enemies.map(e => e.x + ',' + e.y));
      enemies.forEach(en => {
        if (en.type === 'charger' && en.chargeState) return;
        if (en.type === 'shooter' && en.shootState) return;
        if (now - en.lm < en.cd) return;
        en.lm = now;
        en.cd = (en.type === 'fast' ? ENEMY_SPEED / 2 : ENEMY_SPEED) + (Math.random() - 0.5) * 200;
        occupied.delete(en.x + ',' + en.y);

        let moved = false;
        if (Math.random() < 0.3) {
          const dirs = [[0,-1],[0,1],[-1,0],[1,0]].filter(([dx,dy]) => {
            const nx = en.x + dx, ny = en.y + dy;
            return ib(nx, ny) && grid[ny][nx].rev && !occupied.has(nx + ',' + ny);
          });
          if (dirs.length) {
            const [dx, dy] = dirs[Math.floor(Math.random() * dirs.length)];
            en.x += dx; en.y += dy; moved = true;
          }
        }
        if (!moved) {
          const path = bfs(en.x, en.y, player.x, player.y);
          if (path && path.length > 0 && !occupied.has(path[0].x + ',' + path[0].y)) {
            en.x = path[0].x; en.y = path[0].y;
          }
        }

        occupied.add(en.x + ',' + en.y);
        if (en.x === player.x && en.y === player.y) loseGame();

        // Charger: check alignment to start winding
        if (en.type === 'charger' && !en.chargeState) {
          const dx = player.x - en.x, dy = player.y - en.y;
          if ((dx === 0) !== (dy === 0)) {
            en.chargeState = 'winding';
            en.chargeDir = { x: Math.sign(dx), y: Math.sign(dy) };
            en.chargeStart = now;
          }
        }
      });
    }
  }
  if (gameState === 'title') return;
  const lp = 1 - Math.exp(-15 * dt);
  player.fx += (player.x - player.fx) * lp;
  player.fy += (player.y - player.fy) * lp;
  if (Math.abs(player.x - player.fx) < 0.01) player.fx = player.x;
  if (Math.abs(player.y - player.fy) < 0.01) player.fy = player.y;
  enemies.forEach(e => {
    e.fx += (e.x - e.fx) * lp;
    e.fy += (e.y - e.fy) * lp;
    if (Math.abs(e.x - e.fx) < 0.01) e.fx = e.x;
    if (Math.abs(e.y - e.fy) < 0.01) e.fy = e.y;
  });
  particles.forEach(p => {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.94; p.vy *= 0.94; p.life -= dt;
  });
  particles = particles.filter(p => p.life > 0);
  if (shake.i > 0.5) {
    shake.x = (Math.random() - 0.5) * shake.i * 2;
    shake.y = (Math.random() - 0.5) * shake.i * 2;
    shake.i *= Math.exp(-8 * dt);
  } else { shake.i = 0; shake.x = 0; shake.y = 0; }
}

// ---- RENDER ----
function render(now) {
  ctx.save();
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  if (gameState === 'title') {
    drawTitle(now);
    ctx.restore();
    return;
  }

  ctx.translate(shake.x, shake.y);

  for (let y = 0; y < ROWS; y++)
    for (let x = 0; x < COLS; x++)
      drawTile(x, y, now);

  if (gameState === 'playing') {
    const tx = player.x + player.dir.x, ty = player.y + player.dir.y;
    if (ib(tx, ty) && !grid[ty][tx].rev && !grid[ty][tx].crater) {
      ctx.strokeStyle = '#00ff8850';
      ctx.lineWidth = 2;
      ctx.strokeRect(tx * TILE + 2, ty * TILE + HUD_H + 2, TILE - 4, TILE - 4);
    }
  }

  for (let y = 0; y < ROWS; y++)
    for (let x = 0; x < COLS; x++)
      if (grid[y][x].rev && grid[y][x].loot === 'bullet') drawLoot(x, y, now);

  eggs.forEach(e => drawEgg(e, now));
  enemies.forEach(e => drawEnemy(e, now));
  if (player.alive) drawPlayer(now);
  projectiles.forEach(p => drawProj(p));
  enemyBullets.forEach(b => drawEnemyBullet(b));
  particles.forEach(p => drawParticle(p));
  drawHUD();

  if (gameState === 'lost') drawLost();
  else if (gameState === 'won') drawWon();

  ctx.restore();
}

function drawTile(x, y, now) {
  const t = grid[y][x], px = x * TILE, py = y * TILE + HUD_H;
  if (t.crater) {
    ctx.fillStyle = '#070a0e';
    ctx.fillRect(px, py, TILE, TILE);
    ctx.strokeStyle = '#ff3a0018';
    ctx.lineWidth = 1;
    ctx.strokeRect(px + 0.5, py + 0.5, TILE - 1, TILE - 1);
    ctx.fillStyle = '#0a0d12';
    ctx.beginPath();
    ctx.arc(px + TILE / 2, py + TILE / 2, TILE * 0.35, 0, Math.PI * 2);
    ctx.fill();
  } else if (t.rev) {
    ctx.fillStyle = '#161b22';
    ctx.fillRect(px, py, TILE, TILE);
    ctx.strokeStyle = '#1e2329';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(px + 0.5, py + 0.5, TILE - 1, TILE - 1);
    const age = now - (t.rt || 0);
    if (age < 350) {
      const g = 1 - age / 350;
      ctx.fillStyle = `rgba(0,255,136,${g * 0.35})`;
      ctx.fillRect(px, py, TILE, TILE);
    }
    if (t.num > 0) {
      const nc = t.nearMega ? '#ffd700' : NUM_CLR[t.num];
      ctx.save();
      ctx.shadowBlur = t.nearMega ? 10 : 6;
      ctx.shadowColor = nc;
      ctx.fillStyle = nc;
      ctx.font = 'bold 15px Courier New';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(t.num, px + TILE / 2, py + TILE / 2 + 1);
      ctx.restore();
    }
  } else {
    ctx.fillStyle = '#21262d';
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = '#2d333b';
    ctx.fillRect(px, py, TILE, 2);
    ctx.fillRect(px, py, 2, TILE);
    ctx.fillStyle = '#171b21';
    ctx.fillRect(px, py + TILE - 2, TILE, 2);
    ctx.fillRect(px + TILE - 2, py, 2, TILE);
  }
}

function drawLoot(x, y, now) {
  const cx = x * TILE + TILE / 2, cy = y * TILE + TILE / 2 + HUD_H;
  const pulse = 0.8 + Math.sin(now / 300) * 0.2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(Math.PI / 4);
  ctx.globalAlpha = pulse;
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#ffd700';
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(-4, -4, 8, 8);
  ctx.restore();
}

function drawEgg(egg, now) {
  const cx = egg.x * TILE + TILE / 2, cy = egg.y * TILE + TILE / 2 + HUD_H;
  const prog = Math.min((now - egg.t) / HATCH_TIME, 1);
  const wobble = Math.sin(now / (200 - prog * 150)) * prog * 5;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(wobble * Math.PI / 180);
  ctx.fillStyle = `hsl(${18 + prog * 25},90%,${52 + prog * 12}%)`;
  ctx.beginPath();
  ctx.ellipse(0, 0, 6, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  if (prog > 0.5) {
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-3, -4); ctx.lineTo(0, -1); ctx.lineTo(2, -3);
    ctx.stroke();
    if (prog > 0.75) {
      ctx.beginPath();
      ctx.moveTo(-1, 1); ctx.lineTo(1, 4);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawEnemy(e, now) {
  const ec = ENEMY_COLORS[e.type] || ENEMY_COLORS.normal;
  let cx = e.fx * TILE + TILE / 2, cy = e.fy * TILE + TILE / 2 + HUD_H;
  const isWinding = e.type === 'charger' && e.chargeState === 'winding';
  const isCharging = e.type === 'charger' && e.chargeState === 'charging';
  const isAiming = e.type === 'shooter' && e.shootState === 'charging';
  const pSpeed = e.type === 'fast' ? 100 : isWinding ? 40 : isAiming ? 50 : 180;
  const sSpeed = isCharging ? 80 : e.type === 'fast' ? 300 : 600;
  const pulse = 1 + Math.sin(now / pSpeed) * (isWinding || isAiming ? 0.25 : 0.12);

  if (isWinding) {
    cx += (Math.random() - 0.5) * 3;
    cy += (Math.random() - 0.5) * 3;
  }

  ctx.fillStyle = ec.glow;
  ctx.beginPath();
  ctx.arc(cx, cy, (isCharging ? 20 : 16) * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = ec.body;
  ctx.beginPath();
  const spikes = e.type === 'shooter' ? 6 : 8;
  for (let i = 0; i < spikes; i++) {
    const a = (Math.PI * 2 / spikes) * i + now / sSpeed;
    const r = (i % 2 === 0 ? 11 : 7) * pulse;
    const sx = cx + Math.cos(a) * r, sy = cy + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.closePath(); ctx.fill();

  if (e.type === 'charger' && e.chargeState && e.chargeDir) {
    const da = Math.atan2(e.chargeDir.y, e.chargeDir.x);
    ctx.fillStyle = isCharging ? '#dd88ff' : '#aa44ff88';
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(da) * 14 * pulse, cy + Math.sin(da) * 14 * pulse);
    ctx.lineTo(cx + Math.cos(da + 2.5) * 5, cy + Math.sin(da + 2.5) * 5);
    ctx.lineTo(cx + Math.cos(da - 2.5) * 5, cy + Math.sin(da - 2.5) * 5);
    ctx.closePath(); ctx.fill();
  }

  if (isAiming && e.shootDir) {
    const prog = Math.min((now - e.shootStart) / 500, 1);
    const da = Math.atan2(e.shootDir.y, e.shootDir.x);
    ctx.save();
    ctx.globalAlpha = 0.3 + prog * 0.5;
    ctx.strokeStyle = '#66aaff';
    ctx.lineWidth = 2 + prog * 2;
    ctx.shadowBlur = 10 * prog;
    ctx.shadowColor = '#66aaff';
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(da) * 10, cy + Math.sin(da) * 10);
    ctx.lineTo(cx + Math.cos(da) * (14 + prog * 10), cy + Math.sin(da) * (14 + prog * 10));
    ctx.stroke();
    ctx.restore();
  }

  ctx.fillStyle = ec.eye;
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fill();
}

function drawPlayer(now) {
  const cx = player.fx * TILE + TILE / 2, cy = player.fy * TILE + TILE / 2 + HUD_H;
  const pulse = 1 + Math.sin(now / 500) * 0.04;
  ctx.fillStyle = '#00ff8812';
  ctx.beginPath();
  ctx.arc(cx, cy, 18 * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#00ff88';
  ctx.beginPath();
  ctx.arc(cx, cy, 10 * pulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#00cc66';
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.fill();
  const a = Math.atan2(player.dir.y, player.dir.x);
  ctx.fillStyle = '#00dd6a';
  ctx.beginPath();
  ctx.moveTo(cx + Math.cos(a) * 15, cy + Math.sin(a) * 15);
  ctx.lineTo(cx + Math.cos(a + 2.6) * 7, cy + Math.sin(a + 2.6) * 7);
  ctx.lineTo(cx + Math.cos(a - 2.6) * 7, cy + Math.sin(a - 2.6) * 7);
  ctx.closePath(); ctx.fill();
}

function drawProj(p) {
  const px = p.x * TILE, py = p.y * TILE + HUD_H;
  ctx.strokeStyle = '#ffd70050';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(px - p.dx * TILE * 0.6, py - p.dy * TILE * 0.6);
  ctx.stroke();
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(px, py, 3.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawEnemyBullet(b) {
  const px = b.x * TILE, py = b.y * TILE + HUD_H;
  ctx.strokeStyle = '#66aaff40';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(px - b.dx * TILE * 0.8, py - b.dy * TILE * 0.8);
  ctx.stroke();
  ctx.save();
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#66aaff';
  ctx.fillStyle = '#66aaff';
  ctx.beginPath();
  ctx.arc(px, py, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawParticle(p) {
  const alpha = Math.max(0, p.life / p.ml);
  ctx.globalAlpha = alpha * (p.flash ? 0.6 : 1);
  ctx.fillStyle = p.clr;
  if (p.flash) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.sz * alpha, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillRect(p.x - p.sz / 2, p.y - p.sz / 2, p.sz, p.sz);
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.fillStyle = '#0f1318';
  ctx.fillRect(0, 0, W, HUD_H);
  ctx.fillStyle = '#1e2329';
  ctx.fillRect(0, HUD_H - 1, W, 1);

  ctx.font = 'bold 13px Courier New';
  ctx.textBaseline = 'middle';
  const y = HUD_H / 2;

  ctx.fillStyle = '#ffd700';
  ctx.textAlign = 'left';
  ctx.fillText('◆ ' + player.bullets, 14, y);

  const dispTime = gameState === 'playing' ? gameTime : finalTime;
  ctx.fillStyle = '#c9d1d9';
  ctx.fillText(fmtTime(dispTime), 80, y);

  const rev = totalSafe - tilesLeft;
  ctx.fillStyle = '#7a828a';
  ctx.textAlign = 'center';
  ctx.fillText('TILES  ' + rev + ' / ' + totalSafe, W / 2, y);

  ctx.textAlign = 'right';
  if (enemies.length > 0) {
    ctx.fillStyle = '#ff2d55';
    ctx.fillText('▲ ' + enemies.length, W - 14, y - (eggs.length > 0 ? 8 : 0));
  }
  if (eggs.length > 0) {
    ctx.fillStyle = '#ff8a4a';
    ctx.fillText('○ ' + eggs.length, W - 14, y + (enemies.length > 0 ? 8 : 0));
  }
}

function drawTitle(now) {
  ctx.fillStyle = '#0d1117e0';
  ctx.fillRect(0, 0, W, H);

  const lbCount = Math.min(leaderboard.length, 5);
  const cy = H * 0.18;
  const lx = W * 0.15;

  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';

  ctx.save();
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#00ff88';
  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 38px Courier New';
  ctx.fillText('MINECRAWL', lx, cy);
  ctx.restore();

  ctx.fillStyle = '#586069';
  ctx.font = '12px Courier New';
  ctx.fillText('minesweeper × dungeon', lx, cy + 35);

  ctx.fillStyle = '#c9d1d9';
  ctx.font = '13px Courier New';
  const lines = [
    'WASD  ─  Move',
    'SPACE ─  Poll (reveal tile ahead)',
    'E     ─  Shoot (uses ammo)',
  ];
  lines.forEach((l, i) => ctx.fillText(l, lx, cy + 80 + i * 24));

  ctx.fillStyle = '#586069';
  ctx.font = '11px Courier New';
  const tips = [
    'Mines explode 3×3 and chain react',
    'Avoid enemies — mines are the only way to kill them',
    'Clear all safe tiles to win',
  ];
  tips.forEach((t, i) => ctx.fillText(t, lx, cy + 168 + i * 18));

  const cbY = cy + 230;
  ctx.strokeStyle = advancedMode ? '#ffd700' : '#30363d';
  ctx.lineWidth = 2;
  ctx.strokeRect(lx, cbY - 7, 14, 14);
  if (advancedMode) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 12px Courier New';
    ctx.fillText('✓', lx + 2, cbY + 1);
  }
  ctx.fillStyle = advancedMode ? '#ffd700' : '#586069';
  ctx.font = '12px Courier New';
  ctx.fillText('Advanced Mechanics', lx + 22, cbY);

  let bottom = cbY + 24;

  if (lbCount) {
    ctx.fillStyle = '#484f58';
    ctx.font = 'bold 10px Courier New';
    ctx.fillText('─── LEADERBOARD ───', lx, bottom);
    ctx.font = '11px Courier New';
    leaderboard.slice(0, 5).forEach((r, i) => {
      const row = `${i+1}. ${(r.Name||'???').toUpperCase().padEnd(12).slice(0,12)}  ${r.Time||'?:??'}`;
      ctx.fillStyle = i === 0 ? '#ffd700' : i === 1 ? '#c0c0c0' : i === 2 ? '#cd7f32' : '#586069';
      ctx.fillText(row, lx, bottom + 20 + i * 16);
    });
    bottom += 20 + lbCount * 16;
  }

  if (Math.sin(now / 500) > 0) {
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 14px Courier New';
    ctx.fillText('Press any key to start', lx, bottom + 20);
  }
}

function drawLost() {
  ctx.fillStyle = '#0d111799';
  ctx.fillRect(0, 0, W, H);

  const lx = W * 0.15;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';

  ctx.save();
  ctx.shadowBlur = 15;
  ctx.shadowColor = '#ff2d55';
  ctx.fillStyle = '#ff2d55';
  ctx.font = 'bold 34px Courier New';
  const dy = H * 0.18;
  ctx.fillText('GAME OVER', lx, dy);
  ctx.restore();

  const rev = totalSafe - tilesLeft;
  ctx.fillStyle = '#8b949e';
  ctx.font = '14px Courier New';
  ctx.fillText('Cleared ' + rev + ' / ' + totalSafe + '  ·  ' + fmtTime(finalTime), lx, dy + 40);
  ctx.fillStyle = '#586069';
  ctx.fillText('Press R to restart', lx, dy + 75);
}

function drawWon() {
  ctx.fillStyle = '#0d111730';
  ctx.fillRect(0, 0, W, H);
}

// ---- LOOP ----
function loop(ts) {
  let dt = (ts - lastTime) / 1000;
  lastTime = ts;
  if (dt > 0.1) dt = 0.1;
  update(dt, ts);
  render(ts);
  requestAnimationFrame(loop);
}

init();
requestAnimationFrame(loop);
})();
  </script>
</body>
</html>
